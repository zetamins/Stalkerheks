name: CI — Auto Version & Build

on:
  push:
    branches: [master]

permissions:
  contents: write
  actions: write

env:
  NDK_VERSION: r28
  NDK_API: 21

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: latest
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)" >> $GITHUB_OUTPUT
      - id: bump
        run: |
          OLD_NUM=$(echo "${{ steps.latest.outputs.tag }}" | sed 's/v//')
          IFS='.' read -r MAJ MIN PAT <<< "$OLD_NUM"
          NEW="v$MAJ.$MIN.$((PAT+1))"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "tag=$NEW" >> $GITHUB_OUTPUT
          echo "$OLD_NUM → $NEW"
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git tag ${{ steps.bump.outputs.tag }}
          git push origin ${{ steps.bump.outputs.tag }}

  build:
    name: Build ${{ matrix.name }}
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux — no cgo needed
          - {name: stalkerhek-linux-amd64, goos: linux, goarch: amd64}
          - {name: stalkerhek-linux-arm64, goos: linux, goarch: arm64}
          - {name: stalkerhek-linux-arm32, goos: linux, goarch: arm, goarm: "7"}
          # Android — all 4 ABIs, built with cgo + NDK clang
          - {name: stalkerhek-android-arm64, goos: android, goarch: arm64, cc: aarch64-linux-android}
          - {name: stalkerhek-android-arm32, goos: android, goarch: arm, goarm: "7", cc: armv7a-linux-androideabi}
          - {name: stalkerhek-android-x86, goos: android, goarch: "386", cc: i686-linux-android}
          - {name: stalkerhek-android-x86_64, goos: android, goarch: amd64, cc: x86_64-linux-android}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Android NDK
        if: matrix.goos == 'android'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Build
        run: |
          if [ "${{ matrix.goos }}" = "android" ]; then
            export CC="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc }}${NDK_API}-clang"
            export CGO_ENABLED=1
          else
            export CGO_ENABLED=0
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
            go build -o ${{ matrix.name }} ./cmd/stalkerhek/
          file ${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  apk:
    name: Build APK
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'
      - uses: actions/download-artifact@v4
        with:
          path: android/app/src/main/assets
      - name: Organize binaries
        run: |
          mv android/app/src/main/assets/stalkerhek-android-arm64/* android/app/src/main/assets/stalkerhek-arm64
          mv android/app/src/main/assets/stalkerhek-android-arm32/* android/app/src/main/assets/stalkerhek-arm32
          mv android/app/src/main/assets/stalkerhek-android-x86/* android/app/src/main/assets/stalkerhek-x86
          mv android/app/src/main/assets/stalkerhek-android-x86_64/* android/app/src/main/assets/stalkerhek-x86_64
          ls -la android/app/src/main/assets/
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: stalkerhek-apk
          path: android/app/build/outputs/apk/release/*.apk

  release:
    name: GitHub Release
    needs: [version, build, apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
      - run: |
          mkdir -p flat
          find release -type f -not -name '*.apk' -exec cp {} flat/ \;
          find release -name '*.apk' -exec cp {} flat/ \; 2>/dev/null || true
          ls -la flat/
      - uses: softprops/action-gh-release@v1
        with:
          name: ${{ needs.version.outputs.version }}
          tag_name: ${{ needs.version.outputs.tag }}
          files: flat/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
