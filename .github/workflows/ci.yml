name: CI — Auto Version & Build

on:
  push:
    branches: [master]

permissions:
  contents: write
  actions: write

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: latest
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)" >> $GITHUB_OUTPUT
      - id: bump
        run: |
          OLD_NUM=$(echo "${{ steps.latest.outputs.tag }}" | sed 's/v//')
          IFS='.' read -r MAJ MIN PAT <<< "$OLD_NUM"
          NEW="v$MAJ.$MIN.$((PAT+1))"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "tag=$NEW" >> $GITHUB_OUTPUT
          echo "$OLD_NUM → $NEW"
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git tag ${{ steps.bump.outputs.tag }}
          git push origin ${{ steps.bump.outputs.tag }}

  build:
    name: Build ${{ matrix.name }}
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {name: stalkerhek-linux-amd64, goos: linux, goarch: amd64}
          - {name: stalkerhek-linux-arm64, goos: linux, goarch: arm64}
          - {name: stalkerhek-linux-arm32, goos: linux, goarch: arm, goarm: "7"}
          - {name: stalkerhek-android-arm64, goos: android, goarch: arm64}
          - {name: stalkerhek-android-arm32, goos: android, goarch: arm, goarm: "7"}
          - {name: stalkerhek-android-x86_64, goos: android, goarch: amd64}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Setup NDK (for Android CGO builds)
        run: |
          wget --timeout=120 -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip
          echo "NDK=$PWD/android-ndk-r26b" >> $GITHUB_ENV
          ls "$PWD/android-ndk-r26b/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -5
      - name: Build
        run: |
          NAME="${{ matrix.name }}"
          GOOS=${{ matrix.goos }}
          GOARCH=${{ matrix.goarch }}
          GOARM=${{ matrix.goarm }}
          CGO_ENABLED=0

          if [ "$GOOS" = "android" ]; then
            CGO_ENABLED=1
            TARGET="$GOARCH"
            [ "$TARGET" = "arm" ] && TARGET="armv7a-linux-androideabi"
            [ "$TARGET" = "arm64" ] && TARGET="aarch64-linux-android"
            [ "$TARGET" = "amd64" ] && TARGET="x86_64-linux-android"
            export CC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/${TARGET}34-clang"
            export CXX="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/${TARGET}34-clang++"
            export CGO_CFLAGS="--sysroot=$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
            export CGO_LDFLAGS="--sysroot=$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
            echo "Android CGO: ARCH=$GOARCH CC=$CC"
          fi

          go build -o "$NAME" ./cmd/stalkerhek/
          file "$NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  apk:
    name: Build APK
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'
      - uses: actions/download-artifact@v4
        with:
          path: android/app/src/main/assets
      - name: Organize binaries
        run: |
          mv android/app/src/main/assets/stalkerhek-android-arm64/* android/app/src/main/assets/stalkerhek-arm64
          mv android/app/src/main/assets/stalkerhek-android-arm32/* android/app/src/main/assets/stalkerhek-arm
          mv android/app/src/main/assets/stalkerhek-android-x86_64/* android/app/src/main/assets/stalkerhek-x86_64
          ls -la android/app/src/main/assets/
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: stalkerhek-apk
          path: android/app/build/outputs/apk/release/*.apk

  release:
    name: GitHub Release
    needs: [version, build, apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
      - run: |
          mkdir -p flat
          find release -type f -not -name '*.apk' -exec cp {} flat/ \;
          find release -name '*.apk' -exec cp {} flat/ \; 2>/dev/null || true
          ls -la flat/
      - uses: softprops/action-gh-release@v1
        with:
          name: ${{ needs.version.outputs.version }}
          tag_name: ${{ needs.version.outputs.tag }}
          files: flat/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
