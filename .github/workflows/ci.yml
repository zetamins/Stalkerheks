name: CI — Build & APK

on:
  push:
    branches: [master]

permissions:
  contents: write
  actions: write

env:
  NDK_VERSION: r28
  NDK_API: 26

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: latest
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)" >> $GITHUB_OUTPUT
      - id: bump
        run: |
          OLD_NUM=$(echo "${{ steps.latest.outputs.tag }}" | sed 's/v//')
          IFS='.' read -r MAJ MIN PAT <<< "$OLD_NUM"
          NEW="v$MAJ.$MIN.$((PAT+1))"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "tag=$NEW" >> $GITHUB_OUTPUT
          echo "$OLD_NUM → $NEW"
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git tag ${{ steps.bump.outputs.tag }}
          git push origin ${{ steps.bump.outputs.tag }}

  build-jni:
    name: Build JNI engine .so (${{ matrix.abi }})
    runs-on: ubuntu-latest
    needs: version
    strategy:
      matrix:
        include:
          - {abi: arm64-v8a, goarch: arm64, goarm: "", cc: aarch64-linux-android}
          - {abi: armeabi-v7a, goarch: arm, goarm: "7", cc: armv7a-linux-androideabi}
          - {abi: x86, goarch: "386", goarm: "", cc: i686-linux-android}
          - {abi: x86_64, goarch: amd64, goarm: "", cc: x86_64-linux-android}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Build libstalkerhek_engine.so (c-shared)
        run: |
          export CC="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc }}${NDK_API}-clang"
          export CGO_ENABLED=1
          GOOS=android GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
            go build -buildmode=c-shared -o libstalkerhek_engine.so ./cmd/stalkerhek/
          file libstalkerhek_engine.so

      - uses: actions/upload-artifact@v4
        with:
          name: jni-${{ matrix.abi }}
          path: libstalkerhek_engine.so

  build-exec:
    name: Build exec fallback (${{ matrix.abi }})
    runs-on: ubuntu-latest
    needs: version
    strategy:
      matrix:
        include:
          - {abi: arm64-v8a, goarch: arm64, goarm: "", cc: aarch64-linux-android}
          - {abi: armeabi-v7a, goarch: arm, goarm: "7", cc: armv7a-linux-androideabi}
          - {abi: x86, goarch: "386", goarm: "", cc: i686-linux-android}
          - {abi: x86_64, goarch: amd64, goarm: "", cc: x86_64-linux-android}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Build libstalkerhek.so (exec fallback)
        run: |
          export CC="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc }}${NDK_API}-clang"
          export CGO_ENABLED=1
          GOOS=android GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
            go build -o libstalkerhek.so ./cmd/stalkerhek/
          file libstalkerhek.so

      - uses: actions/upload-artifact@v4
        with:
          name: exec-${{ matrix.abi }}
          path: libstalkerhek.so

  apk:
    name: Build & Sign APK
    needs: [version, build-jni, build-exec]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;35.0.0 platforms;android-35'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl
          # jni-<abi>/libstalkerhek_engine.so and exec-<abi>/libstalkerhek.so

      - name: Assemble jniLibs (engine + exec fallback per ABI)
        run: |
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            dest="android/app/src/main/jniLibs/$abi"
            mkdir -p "$dest"
            cp "dl/jni-$abi/libstalkerhek_engine.so" "$dest/"
            cp "dl/exec-$abi/libstalkerhek.so" "$dest/" 2>/dev/null || true
          done

      - name: Verify jniLibs
        run: |
          echo "=== jniLibs structure ==="
          find android/app/src/main/jniLibs -type f -exec ls -lh {} \;
          # Fail fast if the engine is missing for any ABI in abiFilters.
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            f="android/app/src/main/jniLibs/$abi/libstalkerhek_engine.so"
            [ -f "$f" ] || { echo "MISSING engine for $abi: $f"; exit 1; }
          done

      - name: Generate CI keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/release.keystore \
            -alias stalkerhek \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass stalkerhek -keypass stalkerhek \
            -dname "CN=Stalkerhek CI, OU=Dev, O=Stalkerhek, L=N/A, ST=N/A, C=US"

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK (v1+v2+v3)
        run: |
          APK_IN="android/app/build/outputs/apk/release/app-release.apk"
          APK_OUT="android/app/build/outputs/apk/release/stalkerhek-${{ needs.version.outputs.tag }}.apk"

          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks android/release.keystore \
            --ks-pass pass:stalkerhek \
            --ks-key-alias stalkerhek \
            --key-pass pass:stalkerhek \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$APK_OUT" \
            "$APK_IN"

      - uses: actions/upload-artifact@v4
        with:
          name: stalkerhek-apk
          path: android/app/build/outputs/apk/release/stalkerhek-*.apk

  release:
    name: GitHub Release
    needs: [version, apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: stalkerhek-apk
          path: release

      - name: List release artifacts
        run: ls -lh release/

      - uses: softprops/action-gh-release@v1
        with:
          name: ${{ needs.version.outputs.version }}
          tag_name: ${{ needs.version.outputs.tag }}
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
