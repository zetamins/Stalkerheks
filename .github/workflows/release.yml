name: Manual Release (override)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true

env:
  NDK_VERSION: r28
  NDK_API: 21

jobs:
  build-android:
    name: Build Android Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            goarch: arm64
            goarm: ""
            name: stalkerhek-android-arm64
            cc: aarch64-linux-android
          - arch: arm
            goarch: arm
            goarm: "7"
            name: stalkerhek-android-arm32
            cc: armv7a-linux-androideabi
          - arch: x86
            goarch: "386"
            goarm: ""
            name: stalkerhek-android-x86
            cc: i686-linux-android
          - arch: x86_64
            goarch: amd64
            goarm: ""
            name: stalkerhek-android-x86_64
            cc: x86_64-linux-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Build (with CGO + NDK)
        run: |
          export CC="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc }}${NDK_API}-clang"
          CGO_ENABLED=1 GOOS=android GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
            go build -o ${{ matrix.name }} ./cmd/stalkerhek/
          file ${{ matrix.name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            name: stalkerhek-linux-amd64
          - goarch: arm64
            name: stalkerhek-linux-arm64
          - goarch: arm
            goarm: "7"
            name: stalkerhek-linux-arm32
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
            go build -o ${{ matrix.name }} ./cmd/stalkerhek/
          file ${{ matrix.name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Create Release
    needs: [build-android, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Flatten directory
        run: |
          mkdir -p release
          find binaries -type f -executable -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Stalkerhek ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
